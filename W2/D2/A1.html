<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Center UI Card</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <div class="text-xl tracking-wide w-240 h-140 bg-yellow-100 m-20 p-10 ">
        <div class="text-xl w-200 h-100 bg-blue-50 m-8 rounded mr-20 p-15">Notification Center
            <span class="inline-flex bg-black text-blue-800 rounded-full ml-100"> 3 New</span>
            <div class="bg-red-100 rounded-md shadow bg-blue-100 w-150 h-30 mb-1 p-2 mt-4 border-l-4">
                <h2 class="text-bold bg-red-100 border-l-2 border-red-100 ">Action Required</h2>
                <p class="text-sm">your last payment attempt failed.Please update your payment method to avoid service
                    interruption</p>
            </div>
            <div class="bg-blue-100 p-2 rounded-md bg-blue-100 border-l-4 shadow w-150 h-30 mb-1">
                <h2 class="text-bold bg-blue-100 border-l-2 border-blue-100">Maintenance Notice</h2>
                <p class="text-sm">The system will undergo maintenance tonight.
                    Some features may be temporarily unavailable</p>
            </div>
            <button class="View-btn border bg-blue-600 rounded-md p-1">View All</button>
            <button class="Dismiss-btn border rounded-md ml-2 p-1">Dismiss</button>
        </div>
    </div>
</body>

</html>

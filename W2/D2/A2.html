<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metric Snapshot Strip</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="m-5 shadow bg-yellow-100 w-220 h-40 mt-10">                                                                    
      <div class="bg-blue-100 w-200 shadow ml-9 rounded-md mb-3">
            <div class="inline-flex gap-15 m-5">
                <div>
               <h6 class="text-sm">Active Users</h6>
                <p class="text-sm font-bold">12,480</p>
                <span class="center h-1 rounded-md bg-green-400 text-sm bold text-green-700">Up</span>
            </div>
                <div>
                <h6 class="text-sm">Request / Min</h6>
                <p class="text-sm font-bold">1,240</p>
                <span class="center rounded-md bg-blue-400 text-sm text-blue-700">Stable</span>
                </div>
                <div>
                <h6 class="text-sm">Error Rate</h6>
                <p class="text-sm font-bold">2.1%</p>
                <span class="center rounded-md bg-red-400 text-sm text-red-700">Down</span>
                </div>
                <div>
                    <button class="bg-blue-300 rounded-md ml-60">Download Report</button>
                </div>
                </div>
                <p class=" bg-red-200 border-l-3 border-red-400 rounded-sm text-red-500">Speacilized maintance may affect dashboard </p>
       </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task</title>
    <style>
        .box1{
            position: relative;
            top: 20px;
            left: 150px;
            width: 250px;
            height:250px;
            border: 3px solid black;
            background-color: chartreuse;
        }
        .box2{
            background-color: darkorange;
            top: 30px;
            left: 40px;
            width: 15px;
            height: 50px;
            padding:20px;
            margin: 30px;
            border: 3px solid black;
        } 
        .box3{
            position: absolute;
            background-color: darkmagenta;
            margin: 60px;
            top: 10px;
            left:120px;
            width: 40px;
            height: 60px;
            border: 3px solid black;
        }
        .box4{
            position: absolute;
            background-color: darkblue;
            bottom: 0px;
            left: 85px;
            width: 80px;
            height: 100px;
            border: 3px solid black;
            border-radius: 20px black;
            border-bottom: 200px;
        }
        .box5{
            position: absolute;
            background-color: darkorange;
            top: 1px;
            left: 80px;
            width: 400px;
            height: 50px;
            border: 3px solid black;
        }
    </style>
</head>
<body>
        <div class="box1">
             <div class="box2"></div>
             <div class="box3"></div>
             <div class="box4"></div>
        </div>
        <div class="box5"></div>
</body>
</html>

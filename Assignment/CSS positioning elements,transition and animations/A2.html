<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 2</title>
    <style>
        .sticky-box{
            position: sticky;
            top: 0px;
            right: 20px;
            border: 2px solid black;
            background-color: bisque;
            border-radius: 10px;
            box-shadow: 5px 4px black;
            text-align: center;
            margin: 10px;
            color: crimson;
        }
        body{
            background-color: blueviolet;
        }
        .nav{
            position: sticky;
            top: 0;
            background-color: blueviolet;
            padding: 20px;
            z-index: 1;
        }
        .ball{
            width: 100px;
            height: 100px;
            background-color: pink;
            border-radius: 50%;
            position: relative;
            animation: bounce 1s infinite alternate;
        }
        @keyframes bounce {
            from {top: 0px;}
            to {top: 100px}
        }
        .container{
            position: relative;
            height: 300px;
        }
        .box1,.box2{
            position: absolute;
            width: 100px;
            height: 100px;
            padding: 20px;
            color: cadetblue;
            text-align: center;
        }
        .box1{
            background-color: cyan;
            top: 50px;
            left: 50px;
            z-index: 1;
            opacity: 60%;
        }
        .box2{
            background-color:cadetblue;
            top: 80px;
            left: 80px;
            z-index: -2;
        }
    </style> 
</head>
<body>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
        <button type="submit" class="submit-btn">submit</button>
        <div class="sticky-box">Sticky Header</div>
    </nav>
     <h2>Bouncing Ball</h2>
    <div class="ball"></div>
    <h2>Z-index</h2>
    <div class="container">
        <div class="box1"></div>
        <div class="box2"></div>
    </div>
</body>
</html>
